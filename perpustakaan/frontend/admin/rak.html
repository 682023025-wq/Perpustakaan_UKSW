<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rak Buku - Perpustakaan</title>
    <link rel="stylesheet" href="../../static/css/global.css">
    <link rel="stylesheet" href="../../static/css/admin/rak.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="logo">
                <h2>📚 PerpusAdmin</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="users.html">👥 Manajemen Users</a></li>
                <li><a href="katalog.html">📖 Katalog Buku</a></li>
                <li><a href="kategori.html">🏷️ Kategori</a></li>
                <li><a href="rak.html" class="active">📚 Rak Buku</a></li>
                <li><a href="#" onclick="logout()">🚪 Logout</a></li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <h1>Rak Buku</h1>
                <div class="user-info">
                    <span id="userName">Admin</span>
                </div>
            </header>

            <section class="card">
                <div class="card-header">
                    <h3>Daftar Rak</h3>
                    <button class="btn-primary" onclick="showModal('add')">+ Tambah Rak</button>
                </div>

                <div class="filter-section">
                    <input type="text" id="searchRak" placeholder="Cari nama rak/lokasi..." onkeyup="searchRak()">
                </div>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID Rak</th>
                            <th>Nama Rak</th>
                            <th>Lokasi Detail</th>
                            <th>Jumlah Buku</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="rakTableBody">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- Modal Form Rak -->
    <div id="rakModal" class="modal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3 id="modalTitle">Tambah Rak</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="rakForm" onsubmit="saveRak(event)">
                <input type="hidden" id="rakIdEdit">
                <input type="hidden" id="mode" value="add">
                
                <div class="form-group">
                    <label>ID Rak *</label>
                    <input type="text" id="formIdRak" required placeholder="Contoh: R-01">
                </div>

                <div class="form-group">
                    <label>Nama Rak *</label>
                    <input type="text" id="formNamaRak" required placeholder="Contoh: Rak FTI Teori">
                </div>

                <div class="form-group">
                    <label>Lokasi Detail *</label>
                    <input type="text" id="formLokasi" required placeholder="Contoh: Lantai 2, Sayap Kanan">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../static/js/global.js"></script>
    <script src="../../static/js/admin/rak.js"></script>
</body>
</html>
