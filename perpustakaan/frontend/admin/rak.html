<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Rak - Perpustakaan</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/admin/rak.css">
</head>
<body class="desktop-layout">
    <nav class="navbar">
        <div class="navbar-brand">📚 Admin Perpustakaan</div>
        <ul class="navbar-nav">
            <li><span id="nav-user-name">Halo, Admin</span></li>
            <li><a href="/logout">Logout</a></li>
        </ul>
    </nav>

    <div class="main-content">
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="/admin/dashboard">📊 Dashboard</a></li>
                <li><a href="/admin/users">👥 Manajemen User</a></li>
                <li><a href="/admin/katalog">📖 Katalog Buku</a></li>
                <li><a href="/admin/kategori">🏷️ Kategori</a></li>
                <li><a href="/admin/rak" class="active">📚 Rak Buku</a></li>
            </ul>
        </aside>

        <main class="content-area">
            <h1 style="color: var(--primary-red); margin-bottom: 30px;">Manajemen Rak Buku</h1>

            <!-- Form Tambah/Edit Rak -->
            <div class="card">
                <div class="card-header" id="form-title">Tambah Rak Baru</div>
                <form id="rak-form" class="form-inline">
                    <input type="hidden" id="edit-mode" value="false">
                    <div class="form-group">
                        <label for="id_rak">ID Rak</label>
                        <input type="text" id="id_rak" required placeholder="Contoh: R-01">
                    </div>
                    <div class="form-group">
                        <label for="nama_rak">Nama Rak</label>
                        <input type="text" id="nama_rak" required placeholder="Contoh: Rak FTI Teo">
                    </div>
                    <div class="form-group">
                        <label for="lokasi_detail">Lokasi Detail</label>
                        <input type="text" id="lokasi_detail" required placeholder="Contoh: Lantai 2, Sayap Kanan">
                    </div>
                    <div class="form-group form-buttons">
                        <button type="submit" class="btn btn-primary">Simpan</button>
                        <button type="button" class="btn btn-secondary" onclick="resetForm()">Batal</button>
                    </div>
                </form>
            </div>

            <!-- Tabel Data Rak -->
            <div class="card">
                <div class="card-header">Daftar Rak</div>
                <div class="table-responsive">
                    <table id="rak-table">
                        <thead>
                            <tr>
                                <th>ID Rak</th>
                                <th>Nama Rak</th>
                                <th>Lokasi Detail</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="rak-tbody">
                            <!-- Data will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/global.js"></script>
    <script src="/static/js/admin/rak.js"></script>
</body>
</html>
