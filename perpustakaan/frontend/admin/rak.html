<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rak Buku - Perpustakaan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin/dashboard.css') }}">
    <style>
        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-top: 24px;
        }
        
        table { width: 100%; border-collapse: collapse; }
        thead { background-color: #f8f9fa; border-bottom: 2px solid #eee; }
        th {
            text-align: left; padding: 16px 24px; font-weight: 600;
            color: #555; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;
        }
        td {
            padding: 16px 24px; border-bottom: 1px solid #f0f0f0;
            color: #333; font-size: 0.95rem;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #fafafa; }
        
        .action-btn {
            background: none; border: none; cursor: pointer;
            padding: 6px; border-radius: 6px; transition: all 0.2s;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .action-btn.edit { color: #1976d2; }
        .action-btn.edit:hover { background-color: #e3f2fd; }
        .action-btn.delete { color: #d32f2f; }
        .action-btn.delete:hover { background-color: #ffebee; }

        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white; padding: 32px; border-radius: 16px;
            width: 100%; max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; margin-bottom: 8px;
            font-weight: 500; color: #444; font-size: 0.9rem;
        }
        .form-control {
            width: 100%; padding: 12px 16px;
            border: 1px solid #ddd; border-radius: 8px;
            font-family: 'Inter', sans-serif; font-size: 0.95rem;
            transition: border-color 0.2s; box-sizing: border-box;
        }
        .form-control:focus {
            outline: none; border-color: #E53935;
            box-shadow: 0 0 0 3px rgba(229, 57, 53, 0.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #E53935 0%, #c62828 100%);
            color: white; border: none; padding: 12px 24px;
            border-radius: 8px; font-weight: 600; cursor: pointer;
            width: 100%; font-size: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(229, 57, 53, 0.3);
        }
        
        .header-actions {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 24px;
        }
        .search-box { position: relative; width: 300px; }
        .search-box input {
            width: 100%; padding: 10px 16px 10px 40px;
            border: 1px solid #ddd; border-radius: 8px;
            font-family: 'Inter', sans-serif;
        }
        .search-icon {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%); color: #999;
            width: 18px; height: 18px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-text">PERPUSTAKAAN</div>
                <div class="logo-subtext">Admin Panel</div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="{{ url_for('admin.dashboard') }}" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="{{ url_for('admin.users') }}" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span>Pengguna</span>
                </a>
                <a href="{{ url_for('admin.katalog') }}" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                    <span>Katalog Buku</span>
                </a>
                <a href="{{ url_for('admin.kategori') }}" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span>Kategori</span>
                </a>
                <a href="{{ url_for('admin.rak') }}" class="nav-item active">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 3h18v18H3zM9 3v18M15 3v18M3 9h18M3 15h18"></path>
                    </svg>
                    <span>Rak Buku</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="{{ url_for('logout') }}" class="nav-item logout">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Keluar</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1 class="page-title">Manajemen Rak</h1>
                <div class="user-profile">
                    <div class="user-info">
                        <span class="user-name">Admin</span>
                        <span class="user-role">Super Admin</span>
                    </div>
                    <div class="user-avatar">A</div>
                </div>
            </header>

            <div class="content-body">
                <div class="header-actions">
                    <div class="search-box">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="searchInput" placeholder="Cari rak...">
                    </div>
                    <button class="btn-primary" style="width: auto;" onclick="openModal()">
                        + Tambah Rak
                    </button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID Rak</th>
                                <th>Nama Rak</th>
                                <th>Lokasi Detail</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="rakTableBody">
                            <tr>
                                <td colspan="4" style="text-align:center; padding: 40px;">Memuat data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div id="rakModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 24px; font-size: 1.5rem; color: #333;" id="modalTitle">Tambah Rak</h2>
            <form id="rakForm">
                <input type="hidden" id="rakId">
                <div class="form-group">
                    <label for="id_rak">ID Rak</label>
                    <input type="text" id="id_rak" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="nama_rak">Nama Rak</label>
                    <input type="text" id="nama_rak" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="lokasi_detail">Lokasi Detail</label>
                    <input type="text" id="lokasi_detail" class="form-control" required>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 24px;">
                    <button type="button" class="btn-primary" style="background: #ccc; color: #333;" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/global.js') }}"></script>
    <script src="{{ url_for('static', filename='js/admin/rak.js') }}"></script>
</body>
</html>
