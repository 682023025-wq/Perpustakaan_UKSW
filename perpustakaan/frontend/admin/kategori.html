<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori Buku - Perpustakaan</title>
    <link rel="stylesheet" href="../../static/css/global.css">
    <link rel="stylesheet" href="../../static/css/admin/kategori.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="logo">
                <h2>📚 PerpusAdmin</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="users.html">👥 Manajemen Users</a></li>
                <li><a href="katalog.html">📖 Katalog Buku</a></li>
                <li><a href="kategori.html" class="active">🏷️ Kategori</a></li>
                <li><a href="rak.html">📚 Rak Buku</a></li>
                <li><a href="#" onclick="logout()">🚪 Logout</a></li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <h1>Kategori Buku</h1>
                <div class="user-info">
                    <span id="userName">Admin</span>
                </div>
            </header>

            <section class="card">
                <div class="card-header">
                    <h3>Daftar Kategori</h3>
                    <button class="btn-primary" onclick="showModal('add')">+ Tambah Kategori</button>
                </div>

                <div class="filter-section">
                    <input type="text" id="searchKategori" placeholder="Cari nama kategori..." onkeyup="searchKategori()">
                </div>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID Kategori</th>
                            <th>Nama Kategori</th>
                            <th>Jumlah Buku</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="kategoriTableBody">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- Modal Form Kategori -->
    <div id="kategoriModal" class="modal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3 id="modalTitle">Tambah Kategori</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="kategoriForm" onsubmit="saveKategori(event)">
                <input type="hidden" id="kategoriIdEdit">
                <input type="hidden" id="mode" value="add">
                
                <div class="form-group">
                    <label>ID Kategori *</label>
                    <input type="number" id="formIdKategori" required>
                </div>

                <div class="form-group">
                    <label>Nama Kategori *</label>
                    <input type="text" id="formNamaKategori" required>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../static/js/global.js"></script>
    <script src="../../static/js/admin/kategori.js"></script>
</body>
</html>
