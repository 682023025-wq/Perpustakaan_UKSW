<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori Buku - Perpustakaan</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/admin/kategori.css">
</head>
<body class="desktop-layout">
    <nav class="navbar">
        <div class="navbar-brand">📚 Admin Perpustakaan</div>
        <ul class="navbar-nav">
            <li><span id="nav-user-name">Halo, Admin</span></li>
            <li><a href="/logout">Logout</a></li>
        </ul>
    </nav>

    <div class="main-content">
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="/admin/dashboard">📊 Dashboard</a></li>
                <li><a href="/admin/users">👥 Manajemen User</a></li>
                <li><a href="/admin/katalog">📖 Katalog Buku</a></li>
                <li><a href="/admin/kategori" class="active">🏷️ Kategori</a></li>
                <li><a href="/admin/rak">📚 Rak Buku</a></li>
            </ul>
        </aside>

        <main class="content-area">
            <h1 style="color: var(--primary-red); margin-bottom: 30px;">Manajemen Kategori Buku</h1>

            <!-- Form Tambah/Edit Kategori -->
            <div class="card">
                <div class="card-header" id="form-title">Tambah Kategori Baru</div>
                <form id="kategori-form" class="form-inline">
                    <input type="hidden" id="edit-mode" value="false">
                    <div class="form-group">
                        <label for="id_kategori">ID Kategori</label>
                        <input type="number" id="id_kategori" required placeholder="Contoh: 10">
                    </div>
                    <div class="form-group">
                        <label for="nama_kategori">Nama Kategori</label>
                        <input type="text" id="nama_kategori" required placeholder="Contoh: Teknologi">
                    </div>
                    <div class="form-group form-buttons">
                        <button type="submit" class="btn btn-primary">Simpan</button>
                        <button type="button" class="btn btn-secondary" onclick="resetForm()">Batal</button>
                    </div>
                </form>
            </div>

            <!-- Tabel Data Kategori -->
            <div class="card">
                <div class="card-header">Daftar Kategori</div>
                <div class="table-responsive">
                    <table id="kategori-table">
                        <thead>
                            <tr>
                                <th>ID Kategori</th>
                                <th>Nama Kategori</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="kategori-tbody">
                            <!-- Data will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/global.js"></script>
    <script src="/static/js/admin/kategori.js"></script>
</body>
</html>
