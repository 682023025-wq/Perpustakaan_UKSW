<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Buku - Perpustakaan</title>
    <link rel="stylesheet" href="../../static/css/global.css">
    <link rel="stylesheet" href="../../static/css/admin/katalog.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="logo">
                <h2>📚 PerpusAdmin</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="users.html">👥 Manajemen Users</a></li>
                <li><a href="katalog.html" class="active">📖 Katalog Buku</a></li>
                <li><a href="kategori.html">🏷️ Kategori</a></li>
                <li><a href="rak.html">📚 Rak Buku</a></li>
                <li><a href="#" onclick="logout()">🚪 Logout</a></li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <h1>Katalog Buku</h1>
                <div class="user-info">
                    <span id="userName">Admin</span>
                </div>
            </header>

            <section class="card">
                <div class="card-header">
                    <h3>Daftar Buku</h3>
                    <button class="btn-primary" onclick="showModal('add')">+ Tambah Buku</button>
                </div>

                <div class="filter-section">
                    <input type="text" id="searchBook" placeholder="Cari judul/pengarang/ISBN..." onkeyup="searchBooks()">
                    <select id="filterKategori" onchange="loadBooks()">
                        <option value="">Semua Kategori</option>
                    </select>
                </div>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ISBN</th>
                            <th>Judul</th>
                            <th>Pengarang</th>
                            <th>Penerbit</th>
                            <th>Tahun</th>
                            <th>Kategori</th>
                            <th>Stok</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="booksTableBody">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- Modal Form Buku -->
    <div id="bookModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Tambah Buku</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="bookForm" onsubmit="saveBook(event)">
                <input type="hidden" id="isbnEdit">
                <input type="hidden" id="mode" value="add">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>ISBN *</label>
                        <input type="text" id="formIsbn" required>
                    </div>
                    <div class="form-group">
                        <label>Judul Buku *</label>
                        <input type="text" id="formJudul" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Pengarang *</label>
                        <input type="text" id="formPengarang" required>
                    </div>
                    <div class="form-group">
                        <label>Penerbit *</label>
                        <input type="text" id="formPenerbit" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Tahun Terbit *</label>
                        <input type="number" id="formTahunTerbit" min="1900" max="2099" required>
                    </div>
                    <div class="form-group">
                        <label>Bahasa *</label>
                        <input type="text" id="formBahasa" value="Indonesia" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Jumlah Halaman *</label>
                        <input type="number" id="formHalaman" min="1" required>
                    </div>
                    <div class="form-group">
                        <label>Kategori *</label>
                        <select id="formKategori" required>
                            <!-- Will be populated dynamically -->
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label>Sinopsis</label>
                        <textarea id="formSinopsis" rows="4" placeholder="Masukkan sinopsis buku..."></textarea>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group full-width">
                        <label>URL Cover</label>
                        <input type="text" id="formCover" placeholder="https://example.com/cover.jpg">
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../static/js/global.js"></script>
    <script src="../../static/js/admin/katalog.js"></script>
</body>
</html>
