<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Users - Perpustakaan</title>
    <link rel="stylesheet" href="../../static/css/global.css">
    <link rel="stylesheet" href="../../static/css/admin/users.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="logo">
                <h2>📚 PerpusAdmin</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="users.html" class="active">👥 Manajemen Users</a></li>
                <li><a href="katalog.html">📖 Katalog Buku</a></li>
                <li><a href="kategori.html">🏷️ Kategori</a></li>
                <li><a href="rak.html">📚 Rak Buku</a></li>
                <li><a href="#" onclick="logout()">🚪 Logout</a></li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <h1>Manajemen Users</h1>
                <div class="user-info">
                    <span id="userName">Admin</span>
                </div>
            </header>

            <section class="card">
                <div class="card-header">
                    <h3>Daftar Users</h3>
                    <button class="btn-primary" onclick="showModal('add')">+ Tambah User</button>
                </div>

                <div class="filter-section">
                    <input type="text" id="searchUser" placeholder="Cari nama/email..." onkeyup="searchUsers()">
                    <select id="filterRole" onchange="loadUsers()">
                        <option value="">Semua Role</option>
                        <option value="SPRADM">Super Admin</option>
                        <option value="PTGS">Petugas</option>
                        <option value="DSN">Dosen</option>
                        <option value="MHS">Mahasiswa</option>
                    </select>
                    <select id="filterStatus" onchange="loadUsers()">
                        <option value="">Semua Status</option>
                        <option value="Aktif">Aktif</option>
                        <option value="Nonaktif">Nonaktif</option>
                    </select>
                </div>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID User</th>
                            <th>Nama Lengkap</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- Modal Form User -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Tambah User</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="userForm" onsubmit="saveUser(event)">
                <input type="hidden" id="userId">
                <input type="hidden" id="mode" value="add">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>ID User *</label>
                        <input type="text" id="formIdUser" required>
                    </div>
                    <div class="form-group">
                        <label>Username *</label>
                        <input type="text" id="formUsername" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Password *</label>
                        <input type="password" id="formPassword" required>
                    </div>
                    <div class="form-group">
                        <label>Nama Lengkap *</label>
                        <input type="text" id="formNamaLengkap" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="formEmail" required>
                    </div>
                    <div class="form-group">
                        <label>No. Telepon *</label>
                        <input type="text" id="formNoTelepon" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Program Studi</label>
                        <input type="text" id="formProdi">
                    </div>
                    <div class="form-group">
                        <label>Fakultas</label>
                        <input type="text" id="formFakultas">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Role *</label>
                        <select id="formRole" required>
                            <option value="SPRADM">Super Admin</option>
                            <option value="PTGS">Petugas Biasa</option>
                            <option value="DSN">Dosen</option>
                            <option value="MHS">Mahasiswa</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status Aktif *</label>
                        <select id="formStatus" required>
                            <option value="Aktif">Aktif</option>
                            <option value="Nonaktif">Nonaktif</option>
                        </select>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../static/js/global.js"></script>
    <script src="../../static/js/admin/users.js"></script>
</body>
</html>
