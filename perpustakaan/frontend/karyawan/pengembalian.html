<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengembalian - Perpustakaan</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/karyawan/pengembalian.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">📚 Petugas Perpustakaan</div>
        <ul class="navbar-nav">
            <li><span>Halo, {{ session.get('nama_lengkap') }}</span></li>
            <li><a href="/logout">Logout</a></li>
        </ul>
    </nav>
    
    <div class="main-content">
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="/karyawan/dashboard">📊 Dashboard</a></li>
                <li><a href="/karyawan/peminjaman">📤 Peminjaman</a></li>
                <li><a href="/karyawan/pengembalian" class="active">📥 Pengembalian</a></li>
                <li><a href="/karyawan/denda">💰 Denda</a></li>
                <li><a href="/karyawan/laporan">📋 Laporan</a></li>
            </ul>
        </aside>
        
        <main class="content-area">
            <h1 style="color: var(--primary-red); margin-bottom: 30px;">Pengembalian Buku</h1>
            
            <div class="card">
                <div class="card-header">Form Pengembalian</div>
                <div id="alert-container"></div>
                
                <form id="pengembalian-form">
                    <div class="form-group">
                        <label for="id_pinjam">ID Peminjaman</label>
                        <input type="text" id="id_pinjam" class="form-control" required placeholder="Contoh: P-2026-001">
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Proses Pengembalian</button>
                </form>
            </div>
            
            <div class="card">
                <div class="card-header">Riwayat Pengembalian Hari Ini</div>
                <div class="table-responsive">
                    <table id="pengembalian-table">
                        <thead>
                            <tr>
                                <th>ID Pinjam</th>
                                <th>Peminjam</th>
                                <th>Buku</th>
                                <th>Tgl Kembali</th>
                                <th>Denda</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/static/js/global.js"></script>
    <script src="/static/js/karyawan/pengembalian.js"></script>
</body>
</html>
